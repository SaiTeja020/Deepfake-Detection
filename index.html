<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foresight - Deepfake Detection Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #121215;
            --border: #27272a;
            --border-hover: #3f3f46;
            --accent: #10b981;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --card-bg: rgba(24, 24, 27, 0.8);
            --gradient-start: rgba(16, 185, 129, 0.12);
            --dot-color: rgba(255, 255, 255, 0.05);
        }

        [data-theme='light'] {
            --bg: #ffffff;
            --surface: #f8fafc;
            --border: #e2e8f0;
            --border-hover: #cbd5e1;
            --accent: #059669;
            --text-main: #0f172a;
            --text-muted: #475569;
            --card-bg: rgba(255, 255, 255, 0.9);
            --gradient-start: rgba(5, 150, 105, 0.05);
            --dot-color: rgba(0, 0, 0, 0.03);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        .heading-font {
            font-family: 'Bricolage Grotesque', sans-serif;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Decorative Background */
        .bg-dots {
            background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: linear-gradient(to bottom, black, transparent);
        }

        .blob {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--gradient-start) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
            opacity: 0.8;
        }

        .blob-1 {
            top: -100px;
            right: -100px;
            animation: drift 20s infinite alternate;
        }

        .blob-2 {
            bottom: -150px;
            left: -150px;
            animation: drift 25s infinite alternate-reverse;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(50px, 30px) scale(1.1);
            }
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
        }

        .fade-in-up {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scan-line {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            animation: scan 2.5s linear infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% {
                top: -5%;
            }

            100% {
                top: 105%;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }
    </style>

{

</head>
