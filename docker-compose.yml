

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./foresight-2b6ca-firebase-adminsdk-fbsvc-48aa5ab091.json:/app/firebase-service-account.json:ro
      - backend_venv:/app/.venv
      - uv_cache:/root/.cache/uv
    environment:
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/firebase-service-account.json
    env_file:
      - ./backend/.env

volumes:
  frontend_node_modules:
  backend_venv:
  uv_cache:
